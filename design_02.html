<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy's 80s Movie Vault — Neon Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1520;
  --pink: #e8527a;
  --cyan: #00f0ff;
  --yellow: #f0ff00;
  --text: #f0e6d3;
  --card-w: 150px;
  --card-ratio: 1.5;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.06) 2px,
    rgba(0, 0, 0, 0.06) 4px
  );
}

/* ── Sticky Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(26, 21, 32, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--pink);
  box-shadow: 0 2px 30px rgba(232, 82, 122, 0.25);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.site-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 16px;
  color: var(--pink);
  text-shadow:
    0 0 7px var(--pink),
    0 0 20px var(--pink),
    0 0 42px var(--pink),
    0 0 80px rgba(232, 82, 122, 0.4);
  white-space: nowrap;
  letter-spacing: 1px;
  flex-shrink: 0;
}

.search-wrap {
  position: relative;
  flex: 1;
  max-width: 340px;
  min-width: 180px;
}

.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  stroke: var(--pink);
  fill: none;
  stroke-width: 2;
  opacity: 0.7;
}

.search-bar {
  width: 100%;
  padding: 10px 14px 10px 36px;
  background: rgba(255, 255, 255, 0.06);
  border: 1.5px solid rgba(232, 82, 122, 0.4);
  border-radius: 6px;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-bar::placeholder { color: rgba(240, 230, 211, 0.35); }

.search-bar:focus {
  border-color: var(--pink);
  box-shadow: 0 0 12px rgba(232, 82, 122, 0.35);
}

/* ── Genre Filter Bar ── */
.filter-bar {
  padding: 12px 24px 6px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'Press Start 2P', cursive;
  font-size: 9px;
  padding: 10px 16px;
  border-radius: 20px;
  border: 2px solid rgba(232, 82, 122, 0.35);
  background: rgba(232, 82, 122, 0.08);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.filter-btn:hover {
  border-color: var(--pink);
  box-shadow: 0 0 14px rgba(232, 82, 122, 0.3);
  background: rgba(232, 82, 122, 0.15);
}

.filter-btn.active {
  background: var(--pink);
  border-color: var(--pink);
  color: #fff;
  box-shadow:
    0 0 10px rgba(232, 82, 122, 0.5),
    0 0 30px rgba(232, 82, 122, 0.25);
}

/* ── Main Content ── */
.content {
  padding: 20px 0 60px;
}

.genre-section {
  margin-bottom: 32px;
}

.genre-section.hidden { display: none; }

.genre-header {
  font-family: 'Press Start 2P', cursive;
  font-size: 14px;
  padding: 0 24px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.genre-header .genre-icon { font-size: 18px; }

.genre-header .genre-name {
  color: var(--cyan);
  text-shadow:
    0 0 7px var(--cyan),
    0 0 20px var(--cyan),
    0 0 40px rgba(0, 240, 255, 0.3);
}

.genre-header .genre-count {
  font-size: 9px;
  color: rgba(240, 230, 211, 0.4);
  margin-left: 4px;
}

/* neon sign color per genre */
.genre-section[data-genre="Action"] .genre-name {
  color: #ff7a45;
  text-shadow: 0 0 7px #ff7a45, 0 0 20px #ff7a45, 0 0 40px rgba(255, 122, 69, 0.3);
}
.genre-section[data-genre="Comedy"] .genre-name {
  color: #ffc53d;
  text-shadow: 0 0 7px #ffc53d, 0 0 20px #ffc53d, 0 0 40px rgba(255, 197, 61, 0.3);
}
.genre-section[data-genre="Drama"] .genre-name {
  color: #69c0ff;
  text-shadow: 0 0 7px #69c0ff, 0 0 20px #69c0ff, 0 0 40px rgba(105, 192, 255, 0.3);
}
.genre-section[data-genre="Horror"] .genre-name {
  color: #b37feb;
  text-shadow: 0 0 7px #b37feb, 0 0 20px #b37feb, 0 0 40px rgba(179, 127, 235, 0.3);
}
.genre-section[data-genre="Teen"] .genre-name {
  color: var(--pink);
  text-shadow: 0 0 7px var(--pink), 0 0 20px var(--pink), 0 0 40px rgba(232, 82, 122, 0.3);
}
.genre-section[data-genre="Sci-Fi"] .genre-name {
  color: var(--cyan);
  text-shadow: 0 0 7px var(--cyan), 0 0 20px var(--cyan), 0 0 40px rgba(0, 240, 255, 0.3);
}
.genre-section[data-genre="Romance"] .genre-name {
  color: #ff85c0;
  text-shadow: 0 0 7px #ff85c0, 0 0 20px #ff85c0, 0 0 40px rgba(255, 133, 192, 0.3);
}

/* ── Scroll Row ── */
.scroll-row {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 4px 24px 16px;
  cursor: grab;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.scroll-row::-webkit-scrollbar { display: none; }
.scroll-row.dragging { cursor: grabbing; }
.scroll-row.dragging .card { pointer-events: none; }

/* ── Movie Card ── */
.card {
  flex: 0 0 var(--card-w);
  width: var(--card-w);
  transition: transform 0.25s, opacity 0.25s;
  user-select: none;
  -webkit-user-select: none;
}

.card.search-hidden {
  display: none;
}

.card-poster {
  width: 100%;
  aspect-ratio: 2 / 3;
  border-radius: 6px;
  border: 2px solid rgba(232, 82, 122, 0.15);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
}

.card:hover .card-poster {
  border-color: var(--pink);
  box-shadow:
    0 0 8px rgba(232, 82, 122, 0.4),
    0 0 24px rgba(232, 82, 122, 0.2),
    0 0 48px rgba(232, 82, 122, 0.1);
  transform: translateY(-4px) scale(1.03);
}

.card-poster .year-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  background: rgba(0, 0, 0, 0.65);
  color: var(--yellow);
  padding: 4px 6px;
  border-radius: 3px;
  text-shadow: 0 0 6px var(--yellow);
}

.card-title {
  padding: 8px 2px 2px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  line-height: 1.3;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-year {
  font-size: 10px;
  color: rgba(240, 230, 211, 0.45);
  padding: 0 2px;
}

/* ── No Results ── */
.no-results {
  display: none;
  text-align: center;
  padding: 60px 24px;
  font-family: 'Press Start 2P', cursive;
  font-size: 12px;
  color: rgba(240, 230, 211, 0.35);
}

.no-results.visible { display: block; }

/* ── Mobile ── */
@media (max-width: 640px) {
  :root { --card-w: 120px; }

  .header { padding: 10px 14px; gap: 10px; }
  .site-title { font-size: 11px; }
  .search-wrap { max-width: 100%; min-width: 0; order: 3; flex-basis: 100%; }
  .search-bar { font-size: 12px; padding: 9px 12px 9px 34px; }

  .filter-bar { padding: 10px 14px 4px; gap: 7px; }
  .filter-btn { font-size: 7px; padding: 8px 12px; }

  .genre-header { font-size: 11px; padding: 0 14px 10px; }
  .scroll-row { padding: 4px 14px 14px; gap: 12px; }

  .card-title { font-size: 10px; }
  .card-year { font-size: 9px; }
  .card-poster .year-badge { font-size: 7px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="site-title">Amy's 80s Movie Vault</div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-bar" id="searchBar" placeholder="Search movies..." autocomplete="off">
  </div>
</header>

<!-- Filter Bar -->
<nav class="filter-bar" id="filterBar"></nav>

<!-- Content -->
<main class="content" id="content"></main>
<div class="no-results" id="noResults">No movies found</div>

<script>
// ── Movie Data ──
const MOVIES = {
  "Action": {
    gradient: "linear-gradient(135deg, #d4380d, #ff7a45)",
    icon: "💥",
    films: [
      ["Raiders of the Lost Ark", 1981], ["Die Hard", 1988], ["The Terminator", 1984],
      ["RoboCop", 1987], ["Beverly Hills Cop", 1984], ["Top Gun", 1986],
      ["Lethal Weapon", 1987], ["Aliens", 1986], ["First Blood", 1982], ["Predator", 1987]
    ]
  },
  "Comedy": {
    gradient: "linear-gradient(135deg, #faad14, #ffc53d)",
    icon: "😂",
    films: [
      ["Ghostbusters", 1984], ["Ferris Bueller's Day Off", 1986], ["Tootsie", 1982],
      ["Coming to America", 1988], ["Airplane!", 1980], ["Beetlejuice", 1988],
      ["Trading Places", 1983], ["National Lampoon's Vacation", 1983], ["Spaceballs", 1987], ["9 to 5", 1980]
    ]
  },
  "Drama": {
    gradient: "linear-gradient(135deg, #1890ff, #69c0ff)",
    icon: "🎭",
    films: [
      ["Stand By Me", 1986], ["Scarface", 1983], ["Rain Man", 1988],
      ["The Color Purple", 1985], ["Platoon", 1986], ["Full Metal Jacket", 1987],
      ["Ordinary People", 1980], ["Driving Miss Daisy", 1989], ["Blue Velvet", 1986], ["Do the Right Thing", 1989]
    ]
  },
  "Horror": {
    gradient: "linear-gradient(135deg, #722ed1, #b37feb)",
    icon: "👻",
    films: [
      ["The Shining", 1980], ["A Nightmare on Elm Street", 1984], ["The Thing", 1982],
      ["Poltergeist", 1982], ["Gremlins", 1984], ["The Fly", 1986],
      ["Friday the 13th", 1980], ["Halloween II", 1981], ["Christine", 1983], ["Hellraiser", 1987]
    ]
  },
  "Teen": {
    gradient: "linear-gradient(135deg, #e8527a, #ff85a2)",
    icon: "🎒",
    films: [
      ["The Breakfast Club", 1985], ["Sixteen Candles", 1984], ["Pretty in Pink", 1986],
      ["Fast Times at Ridgemont High", 1982], ["Heathers", 1988], ["Say Anything", 1989],
      ["Valley Girl", 1983], ["Some Kind of Wonderful", 1987], ["Weird Science", 1985]
    ]
  },
  "Sci-Fi": {
    gradient: "linear-gradient(135deg, #13c2c2, #5cdbd3)",
    icon: "🚀",
    films: [
      ["Back to the Future", 1985], ["E.T.", 1982], ["Blade Runner", 1982],
      ["Tron", 1982], ["WarGames", 1983], ["The Last Starfighter", 1984],
      ["Cocoon", 1985], ["Short Circuit", 1986], ["They Live", 1988]
    ]
  },
  "Romance": {
    gradient: "linear-gradient(135deg, #eb2f96, #ff85c0)",
    icon: "💕",
    films: [
      ["Dirty Dancing", 1987], ["Flashdance", 1983], ["An Officer and a Gentleman", 1982],
      ["When Harry Met Sally", 1989], ["Moonstruck", 1987], ["The Princess Bride", 1987]
    ]
  }
};

const genres = Object.keys(MOVIES);
const content = document.getElementById('content');
const filterBar = document.getElementById('filterBar');
const searchBar = document.getElementById('searchBar');
const noResults = document.getElementById('noResults');

// ── Build Filter Buttons ──
const allBtn = document.createElement('button');
allBtn.className = 'filter-btn active';
allBtn.textContent = 'All';
allBtn.dataset.genre = 'All';
filterBar.appendChild(allBtn);

genres.forEach(g => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = g;
  btn.dataset.genre = g;
  filterBar.appendChild(btn);
});

// ── Build Genre Sections ──
genres.forEach(genre => {
  const data = MOVIES[genre];
  const section = document.createElement('section');
  section.className = 'genre-section';
  section.dataset.genre = genre;

  section.innerHTML = `
    <div class="genre-header">
      <span class="genre-icon">${data.icon}</span>
      <span class="genre-name">${genre}</span>
      <span class="genre-count">${data.films.length} films</span>
    </div>
  `;

  const row = document.createElement('div');
  row.className = 'scroll-row';

  data.films.forEach(([title, year]) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.title = title.toLowerCase();
    card.dataset.year = String(year);
    card.innerHTML = `
      <div class="card-poster" style="background:${data.gradient}">
        <span class="year-badge">${year}</span>
      </div>
      <div class="card-title" title="${title}">${title}</div>
      <div class="card-year">${year}</div>
    `;
    row.appendChild(card);
  });

  section.appendChild(row);
  content.appendChild(section);
});

// ── Genre Filter Logic ──
let activeGenre = 'All';

filterBar.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeGenre = btn.dataset.genre;
  applyFilters();
});

// ── Search Logic ──
searchBar.addEventListener('input', () => applyFilters());

function applyFilters() {
  const query = searchBar.value.trim().toLowerCase();
  let anyVisible = false;

  document.querySelectorAll('.genre-section').forEach(section => {
    const genre = section.dataset.genre;
    const genreMatch = activeGenre === 'All' || activeGenre === genre;

    if (!genreMatch) {
      section.classList.add('hidden');
      return;
    }

    let sectionHasVisible = false;
    section.querySelectorAll('.card').forEach(card => {
      const titleMatch = !query || card.dataset.title.includes(query) || card.dataset.year.includes(query);
      card.classList.toggle('search-hidden', !titleMatch);
      if (titleMatch) sectionHasVisible = true;
    });

    section.classList.toggle('hidden', !sectionHasVisible);
    if (sectionHasVisible) anyVisible = true;
  });

  noResults.classList.toggle('visible', !anyVisible);
}

// ── Drag-to-Scroll ──
document.querySelectorAll('.scroll-row').forEach(row => {
  let isDown = false, startX, scrollLeft;

  row.addEventListener('mousedown', e => {
    isDown = true;
    row.classList.add('dragging');
    startX = e.pageX - row.offsetLeft;
    scrollLeft = row.scrollLeft;
  });

  row.addEventListener('mouseleave', () => { isDown = false; row.classList.remove('dragging'); });
  row.addEventListener('mouseup', () => { isDown = false; row.classList.remove('dragging'); });

  row.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - row.offsetLeft;
    row.scrollLeft = scrollLeft - (x - startX) * 1.5;
  });

  // Touch support
  let touchStartX, touchScrollLeft;
  row.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].pageX - row.offsetLeft;
    touchScrollLeft = row.scrollLeft;
  }, { passive: true });

  row.addEventListener('touchmove', e => {
    const x = e.touches[0].pageX - row.offsetLeft;
    row.scrollLeft = touchScrollLeft - (x - touchStartX);
  }, { passive: true });
});
</script>
</body>
</html>
