<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy's 80s Movie Vault — Miami Vice</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --pink: #e8527a;
  --flamingo: #ff6b9d;
  --teal: #26a69a;
  --coral: #ff8a65;
  --gold: #ffd54f;
  --bg-top: #fce4ec;
  --bg-bottom: #e0f2f1;
  --card-shadow: 0 4px 20px rgba(232, 82, 122, 0.10);
  --card-shadow-hover: 0 8px 32px rgba(232, 82, 122, 0.22);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, var(--bg-top) 0%, #fdf0f3 30%, #f3f9f8 60%, var(--bg-bottom) 100%);
  min-height: 100vh;
  color: #3e2c2c;
  overflow-x: hidden;
  position: relative;
}

/* ── Palm tree / sunset CSS accents ── */
body::before {
  content: '';
  position: fixed;
  top: -80px;
  right: -60px;
  width: 320px;
  height: 320px;
  background: radial-gradient(circle at 50% 60%, var(--gold) 0%, var(--coral) 40%, transparent 70%);
  border-radius: 50%;
  opacity: 0.18;
  z-index: 0;
  pointer-events: none;
}

body::after {
  content: '';
  position: fixed;
  bottom: -40px;
  left: -40px;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle at 50% 40%, var(--flamingo) 0%, var(--pink) 45%, transparent 70%);
  border-radius: 50%;
  opacity: 0.13;
  z-index: 0;
  pointer-events: none;
}

/* ── Palm frond decorations ── */
.palm-deco {
  position: fixed;
  z-index: 0;
  pointer-events: none;
}

.palm-deco--1 {
  top: 60px;
  right: 20px;
  width: 120px;
  height: 200px;
  opacity: 0.07;
}

.palm-deco--1::before, .palm-deco--1::after {
  content: '';
  position: absolute;
  border-radius: 0 80% 0 80%;
}

.palm-deco--1::before {
  width: 100px;
  height: 30px;
  background: var(--teal);
  top: 0;
  right: 0;
  transform: rotate(-25deg);
}

.palm-deco--1::after {
  width: 90px;
  height: 26px;
  background: var(--teal);
  top: 20px;
  right: 10px;
  transform: rotate(10deg);
}

/* ── Sticky Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(252, 228, 236, 0.82);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 2px solid rgba(232, 82, 122, 0.15);
  padding: 0 24px;
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 68px;
  gap: 16px;
}

.site-title {
  font-family: 'Pacifico', cursive;
  font-size: 1.7rem;
  color: var(--pink);
  white-space: nowrap;
  text-shadow: 0 2px 8px rgba(232, 82, 122, 0.15);
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.search-wrap {
  position: relative;
  flex: 0 1 340px;
}

.search-input {
  width: 100%;
  padding: 10px 16px 10px 42px;
  border: 2px solid rgba(232, 82, 122, 0.25);
  border-radius: 28px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.9rem;
  background: rgba(255,255,255,0.8);
  color: #3e2c2c;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-input::placeholder { color: #c9a0a0; }

.search-input:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 4px rgba(232, 82, 122, 0.12);
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  color: var(--pink);
  opacity: 0.6;
}

/* ── Genre Filter Bar ── */
.filter-bar {
  position: sticky;
  top: 68px;
  z-index: 99;
  background: rgba(243, 249, 248, 0.78);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(38, 166, 154, 0.1);
  padding: 12px 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.filter-bar::-webkit-scrollbar { display: none; }

.filter-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
}

.filter-btn {
  font-family: 'Poppins', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 7px 20px;
  border-radius: 22px;
  border: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s ease;
  background: rgba(255,255,255,0.7);
  color: #7a5a5a;
  letter-spacing: 0.3px;
}

.filter-btn:hover {
  background: rgba(232, 82, 122, 0.08);
  border-color: var(--pink);
  color: var(--pink);
}

.filter-btn.active {
  background: var(--pink);
  color: #fff;
  border-color: var(--pink);
  box-shadow: 0 3px 14px rgba(232, 82, 122, 0.3);
}

/* ── Main Content ── */
.main {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px 24px 60px;
}

/* ── Genre Row ── */
.genre-row {
  margin-bottom: 36px;
  transition: opacity 0.3s;
}

.genre-row.hidden {
  display: none;
}

.genre-header {
  font-family: 'Poppins', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--pink);
  margin-bottom: 14px;
  padding-bottom: 6px;
  border-bottom: 3px solid rgba(232, 82, 122, 0.18);
  display: inline-block;
  letter-spacing: 0.5px;
}

.genre-header .genre-icon {
  margin-right: 6px;
}

.scroll-row {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 8px 4px 16px;
  scroll-behavior: auto;
  cursor: grab;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.scroll-row::-webkit-scrollbar { display: none; }

.scroll-row.dragging {
  cursor: grabbing;
  scroll-behavior: auto;
}

/* ── Movie Card ── */
.movie-card {
  flex: 0 0 150px;
  min-width: 150px;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
  border: 2px solid transparent;
  position: relative;
  user-select: none;
  -webkit-user-select: none;
}

.movie-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  z-index: 2;
  transition: width 0.3s;
}

.movie-card[data-genre="Action"]::before { background: linear-gradient(180deg, #d4380d, #ff7a45); }
.movie-card[data-genre="Comedy"]::before { background: linear-gradient(180deg, #faad14, #ffc53d); }
.movie-card[data-genre="Drama"]::before { background: linear-gradient(180deg, #1890ff, #69c0ff); }
.movie-card[data-genre="Horror"]::before { background: linear-gradient(180deg, #722ed1, #b37feb); }
.movie-card[data-genre="Teen"]::before { background: linear-gradient(180deg, #e8527a, #ff85a2); }
.movie-card[data-genre="Sci-Fi"]::before { background: linear-gradient(180deg, #13c2c2, #5cdbd3); }
.movie-card[data-genre="Romance"]::before { background: linear-gradient(180deg, #eb2f96, #ff85c0); }

.movie-card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: var(--card-shadow-hover);
  border-color: var(--pink);
}

.movie-card:hover::before {
  width: 6px;
}

.movie-card.card-hidden {
  display: none;
}

.poster {
  width: 100%;
  aspect-ratio: 3 / 4.5;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.poster-gradient {
  position: absolute;
  inset: 0;
}

.poster-year {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-size: 0.68rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 10px;
  backdrop-filter: blur(4px);
  letter-spacing: 0.5px;
}

.poster-film-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 36px;
  height: 36px;
  opacity: 0.3;
}

.card-info {
  padding: 10px 10px 12px;
}

.card-title {
  font-size: 0.78rem;
  font-weight: 600;
  line-height: 1.25;
  color: #3e2c2c;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── No Results ── */
.no-results {
  display: none;
  text-align: center;
  padding: 60px 20px;
  color: #c9a0a0;
  font-size: 1.1rem;
  font-weight: 500;
}

.no-results.visible {
  display: block;
}

/* ── Sunset strip at bottom ── */
.sunset-strip {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 4px;
  background: linear-gradient(90deg, var(--gold), var(--coral), var(--pink), var(--flamingo), var(--teal));
  z-index: 100;
}

/* ── Mobile ── */
@media (max-width: 768px) {
  .header-inner {
    height: 56px;
    gap: 10px;
  }

  .site-title {
    font-size: 1.2rem;
  }

  .search-wrap {
    flex: 0 1 200px;
  }

  .search-input {
    padding: 8px 12px 8px 36px;
    font-size: 0.82rem;
  }

  .filter-bar {
    top: 56px;
    padding: 8px 16px;
  }

  .filter-btn {
    font-size: 0.75rem;
    padding: 6px 14px;
  }

  .main {
    padding: 16px 16px 50px;
  }

  .genre-header {
    font-size: 1.05rem;
  }

  .scroll-row {
    gap: 12px;
  }

  .movie-card {
    flex: 0 0 120px;
    min-width: 120px;
    border-radius: 12px;
  }

  .card-title {
    font-size: 0.7rem;
  }

  .card-info {
    padding: 8px 8px 10px;
  }

  .poster-year {
    font-size: 0.6rem;
  }
}

@media (max-width: 400px) {
  .site-title {
    font-size: 1rem;
  }

  .search-wrap {
    flex: 0 1 160px;
  }

  .movie-card {
    flex: 0 0 110px;
    min-width: 110px;
  }
}
</style>
</head>
<body>

<div class="palm-deco palm-deco--1"></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="site-title">Amy's 80s Movie Vault</div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search movies...">
    </div>
  </div>
</header>

<!-- Genre Filter Bar -->
<nav class="filter-bar">
  <div class="filter-inner" id="filterBar">
    <button class="filter-btn active" data-genre="All">All</button>
    <button class="filter-btn" data-genre="Action">Action</button>
    <button class="filter-btn" data-genre="Comedy">Comedy</button>
    <button class="filter-btn" data-genre="Drama">Drama</button>
    <button class="filter-btn" data-genre="Horror">Horror</button>
    <button class="filter-btn" data-genre="Teen">Teen</button>
    <button class="filter-btn" data-genre="Sci-Fi">Sci-Fi</button>
    <button class="filter-btn" data-genre="Romance">Romance</button>
  </div>
</nav>

<!-- Main Content -->
<main class="main" id="mainContent"></main>

<div class="no-results" id="noResults">No movies found matching your search.</div>

<!-- Sunset strip -->
<div class="sunset-strip"></div>

<script>
// ── Movie Data ──
const movieData = {
  "Action": [
    { title: "Raiders of the Lost Ark", year: 1981 },
    { title: "Die Hard", year: 1988 },
    { title: "The Terminator", year: 1984 },
    { title: "RoboCop", year: 1987 },
    { title: "Beverly Hills Cop", year: 1984 },
    { title: "Top Gun", year: 1986 },
    { title: "Lethal Weapon", year: 1987 },
    { title: "Aliens", year: 1986 },
    { title: "First Blood", year: 1982 },
    { title: "Predator", year: 1987 }
  ],
  "Comedy": [
    { title: "Ghostbusters", year: 1984 },
    { title: "Ferris Bueller's Day Off", year: 1986 },
    { title: "Tootsie", year: 1982 },
    { title: "Coming to America", year: 1988 },
    { title: "Airplane!", year: 1980 },
    { title: "Beetlejuice", year: 1988 },
    { title: "Trading Places", year: 1983 },
    { title: "National Lampoon's Vacation", year: 1983 },
    { title: "Spaceballs", year: 1987 },
    { title: "9 to 5", year: 1980 }
  ],
  "Drama": [
    { title: "Stand By Me", year: 1986 },
    { title: "Scarface", year: 1983 },
    { title: "Rain Man", year: 1988 },
    { title: "The Color Purple", year: 1985 },
    { title: "Platoon", year: 1986 },
    { title: "Full Metal Jacket", year: 1987 },
    { title: "Ordinary People", year: 1980 },
    { title: "Driving Miss Daisy", year: 1989 },
    { title: "Blue Velvet", year: 1986 },
    { title: "Do the Right Thing", year: 1989 }
  ],
  "Horror": [
    { title: "The Shining", year: 1980 },
    { title: "A Nightmare on Elm Street", year: 1984 },
    { title: "The Thing", year: 1982 },
    { title: "Poltergeist", year: 1982 },
    { title: "Gremlins", year: 1984 },
    { title: "The Fly", year: 1986 },
    { title: "Friday the 13th", year: 1980 },
    { title: "Halloween II", year: 1981 },
    { title: "Christine", year: 1983 },
    { title: "Hellraiser", year: 1987 }
  ],
  "Teen": [
    { title: "The Breakfast Club", year: 1985 },
    { title: "Sixteen Candles", year: 1984 },
    { title: "Pretty in Pink", year: 1986 },
    { title: "Fast Times at Ridgemont High", year: 1982 },
    { title: "Heathers", year: 1988 },
    { title: "Say Anything", year: 1989 },
    { title: "Valley Girl", year: 1983 },
    { title: "Some Kind of Wonderful", year: 1987 },
    { title: "Weird Science", year: 1985 }
  ],
  "Sci-Fi": [
    { title: "Back to the Future", year: 1985 },
    { title: "E.T.", year: 1982 },
    { title: "Blade Runner", year: 1982 },
    { title: "Tron", year: 1982 },
    { title: "WarGames", year: 1983 },
    { title: "The Last Starfighter", year: 1984 },
    { title: "Cocoon", year: 1985 },
    { title: "Short Circuit", year: 1986 },
    { title: "They Live", year: 1988 }
  ],
  "Romance": [
    { title: "Dirty Dancing", year: 1987 },
    { title: "Flashdance", year: 1983 },
    { title: "An Officer and a Gentleman", year: 1982 },
    { title: "When Harry Met Sally", year: 1989 },
    { title: "Moonstruck", year: 1987 },
    { title: "The Princess Bride", year: 1987 }
  ]
};

const posterGradients = {
  "Action": "linear-gradient(135deg, #d4380d, #ff7a45)",
  "Comedy": "linear-gradient(135deg, #faad14, #ffc53d)",
  "Drama": "linear-gradient(135deg, #1890ff, #69c0ff)",
  "Horror": "linear-gradient(135deg, #722ed1, #b37feb)",
  "Teen": "linear-gradient(135deg, #e8527a, #ff85a2)",
  "Sci-Fi": "linear-gradient(135deg, #13c2c2, #5cdbd3)",
  "Romance": "linear-gradient(135deg, #eb2f96, #ff85c0)"
};

const genreIcons = {
  "Action": "💥",
  "Comedy": "😂",
  "Drama": "🎭",
  "Horror": "👻",
  "Teen": "🎒",
  "Sci-Fi": "🚀",
  "Romance": "💕"
};

// ── Build DOM ──
const main = document.getElementById('mainContent');

const filmIconSVG = `<svg class="poster-film-icon" viewBox="0 0 24 24" fill="white"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>`;

Object.keys(movieData).forEach(genre => {
  const row = document.createElement('div');
  row.className = 'genre-row';
  row.dataset.genre = genre;

  row.innerHTML = `
    <h2 class="genre-header"><span class="genre-icon">${genreIcons[genre]}</span>${genre}</h2>
    <div class="scroll-row">
      ${movieData[genre].map(movie => `
        <div class="movie-card" data-genre="${genre}" data-title="${movie.title.toLowerCase()}">
          <div class="poster">
            <div class="poster-gradient" style="background: ${posterGradients[genre]}"></div>
            ${filmIconSVG}
            <span class="poster-year">${movie.year}</span>
          </div>
          <div class="card-info">
            <div class="card-title">${movie.title}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  main.appendChild(row);
});

// ── Genre Filter ──
let activeGenre = 'All';
const filterBtns = document.querySelectorAll('.filter-btn');

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGenre = btn.dataset.genre;
    applyFilters();
  });
});

// ── Search ──
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => applyFilters());

function applyFilters() {
  const query = searchInput.value.toLowerCase().trim();
  const rows = document.querySelectorAll('.genre-row');
  let totalVisible = 0;

  rows.forEach(row => {
    const genre = row.dataset.genre;
    const genreMatch = activeGenre === 'All' || genre === activeGenre;

    if (!genreMatch) {
      row.classList.add('hidden');
      return;
    }

    row.classList.remove('hidden');
    const cards = row.querySelectorAll('.movie-card');
    let rowVisible = 0;

    cards.forEach(card => {
      const title = card.dataset.title;
      if (!query || title.includes(query)) {
        card.classList.remove('card-hidden');
        rowVisible++;
      } else {
        card.classList.add('card-hidden');
      }
    });

    if (rowVisible === 0) {
      row.classList.add('hidden');
    }

    totalVisible += rowVisible;
  });

  const noResults = document.getElementById('noResults');
  noResults.classList.toggle('visible', totalVisible === 0);
}

// ── Drag-to-Scroll ──
document.querySelectorAll('.scroll-row').forEach(row => {
  let isDown = false;
  let startX;
  let scrollLeft;
  let hasDragged = false;

  row.addEventListener('mousedown', e => {
    isDown = true;
    hasDragged = false;
    row.classList.add('dragging');
    startX = e.pageX - row.offsetLeft;
    scrollLeft = row.scrollLeft;
    e.preventDefault();
  });

  row.addEventListener('mouseleave', () => {
    isDown = false;
    row.classList.remove('dragging');
  });

  row.addEventListener('mouseup', () => {
    isDown = false;
    row.classList.remove('dragging');
  });

  row.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - row.offsetLeft;
    const walk = (x - startX) * 1.5;
    if (Math.abs(walk) > 3) hasDragged = true;
    row.scrollLeft = scrollLeft - walk;
  });

  // Touch support
  let touchStartX;
  let touchScrollLeft;

  row.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].pageX - row.offsetLeft;
    touchScrollLeft = row.scrollLeft;
  }, { passive: true });

  row.addEventListener('touchmove', e => {
    if (touchStartX === undefined) return;
    const x = e.touches[0].pageX - row.offsetLeft;
    const walk = (x - touchStartX) * 1.2;
    row.scrollLeft = touchScrollLeft - walk;
  }, { passive: true });

  row.addEventListener('touchend', () => {
    touchStartX = undefined;
  }, { passive: true });
});
</script>
</body>
</html>
