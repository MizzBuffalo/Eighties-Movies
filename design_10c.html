<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mainframe Dashboard — 80s Movie Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink: #e8527a;
  --green: #33ff33;
  --amber: #ffaa00;
  --white: #fff;
  --bg: #000;
  --panel-bg: #0a0a0a;
  --border: #333;
}

body {
  font-family: 'Fira Code', monospace;
  background: var(--bg);
  color: var(--green);
  min-height: 100vh;
  overflow-x: hidden;
}

/* CRT Scanline Overlay */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15) 0px,
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 9999;
}

/* CRT Vignette */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 9998;
}

.dashboard {
  max-width: 1400px;
  margin: 0 auto;
  padding: 10px;
}

/* Header */
.main-header {
  text-align: center;
  padding: 12px 0 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
}
.main-header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 4px;
  text-shadow: 0 0 10px rgba(51,255,51,0.5);
}
.main-header .sub {
  font-size: 0.65rem;
  color: var(--amber);
  margin-top: 2px;
}

/* Top Panel Row */
.panel-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.panel {
  border: 1px solid var(--border);
  background: var(--panel-bg);
  height: 200px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-title {
  background: #111;
  border-bottom: 1px solid var(--border);
  padding: 4px 10px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.panel-title .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 4px var(--green);
  animation: blink-dot 2s infinite;
}
@keyframes blink-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.panel-title.pink { color: var(--pink); }
.panel-title.pink .dot { background: var(--pink); box-shadow: 0 0 4px var(--pink); }

.panel-body {
  flex: 1;
  padding: 10px;
  overflow: hidden;
  position: relative;
}

/* Panel 1: System Status */
.stat-line {
  font-size: 0.75rem;
  margin-bottom: 6px;
  color: var(--green);
}
.stat-line .label { color: #888; }
.stat-line .value {
  color: var(--green);
  text-shadow: 0 0 6px rgba(51,255,51,0.4);
}
.stat-line .value.amber { color: var(--amber); text-shadow: 0 0 6px rgba(255,170,0,0.4); }

/* Panel 2: Now Playing */
.now-playing {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
}
.now-poster {
  width: 80px;
  height: 70px;
  border-radius: 2px;
  margin-bottom: 6px;
  border: 1px solid var(--border);
}
.now-title {
  font-size: 0.7rem;
  color: var(--pink);
  font-weight: 700;
  text-shadow: 0 0 8px rgba(232,82,122,0.4);
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.now-year {
  font-size: 0.6rem;
  color: var(--pink);
  opacity: 0.7;
  margin-top: 2px;
}
.now-hint {
  font-size: 0.55rem;
  color: #555;
  margin-top: 8px;
  animation: blink-cursor 1s step-end infinite;
}
@keyframes blink-cursor {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Panel 3: Activity Log */
.activity-log {
  font-size: 0.65rem;
  color: var(--green);
  overflow: hidden;
  height: 100%;
}
.log-line {
  margin-bottom: 3px;
  white-space: nowrap;
  opacity: 0;
  animation: fadein-line 0.3s forwards;
}
.log-line .ok { color: var(--green); }
.log-line .warn { color: var(--amber); }
.log-line .info { color: #888; }

@keyframes fadein-line {
  to { opacity: 1; }
}

/* Browser Section */
.browser-section {
  border: 1px solid var(--border);
  background: var(--panel-bg);
  margin-bottom: 10px;
}

.browser-header {
  background: #111;
  border-bottom: 1px solid var(--border);
  padding: 4px 10px;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 8px;
}
.browser-header .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 4px var(--green);
}

/* Genre Tabs */
.genre-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.genre-tab {
  background: none;
  border: 1px solid var(--border);
  color: #888;
  font-family: 'Fira Code', monospace;
  font-size: 0.65rem;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.15s;
  margin-right: -1px;
}
.genre-tab:hover {
  color: var(--pink);
  border-color: var(--pink);
  z-index: 1;
}
.genre-tab.active {
  color: var(--pink);
  border-color: var(--pink);
  background: rgba(232,82,122,0.1);
  text-shadow: 0 0 6px rgba(232,82,122,0.3);
  z-index: 1;
}

/* Search Bar */
.search-bar {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
}
.search-bar .prompt {
  color: var(--green);
  margin-right: 6px;
  flex-shrink: 0;
}
.search-bar input {
  background: none;
  border: none;
  color: var(--green);
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  outline: none;
  flex: 1;
  caret-color: var(--green);
}
.search-bar input::placeholder { color: #444; }
.search-bar .cursor-blink {
  color: var(--green);
  animation: blink-cursor 1s step-end infinite;
}

/* Movie Grid */
.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  padding: 10px;
}

.movie-card {
  background: #0d0d0d;
  border: 1px solid var(--border);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.movie-card:hover {
  border-color: var(--pink);
  transform: translateY(-2px);
}
.movie-poster {
  width: 100%;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  position: relative;
  overflow: hidden;
}
.movie-poster .poster-label {
  position: absolute;
  bottom: 6px;
  left: 6px;
  font-size: 0.5rem;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.movie-meta {
  padding: 6px 8px;
  font-size: 0.55rem;
  color: #888;
  border-top: 1px solid var(--border);
  line-height: 1.5;
}
.movie-meta .movie-name {
  color: var(--white);
  font-weight: 600;
  font-size: 0.6rem;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.movie-meta .movie-id {
  color: var(--amber);
}

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 40px;
  color: #555;
  font-size: 0.8rem;
}

/* Bottom Ticker */
.ticker {
  border: 1px solid var(--border);
  background: var(--panel-bg);
  overflow: hidden;
  padding: 6px 0;
  position: relative;
}
.ticker-inner {
  display: inline-block;
  white-space: nowrap;
  font-size: 0.7rem;
  color: var(--amber);
  animation: scroll-ticker 20s linear infinite;
}
@keyframes scroll-ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Mobile */
@media (max-width: 768px) {
  .panel-row {
    grid-template-columns: 1fr;
  }
  .panel { height: 180px; }
  .genre-tabs { flex-wrap: wrap; }
  .genre-tab { font-size: 0.6rem; padding: 3px 6px; }
  .movie-grid {
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .movie-poster { height: 130px; }
}

@media (max-width: 480px) {
  .movie-grid {
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  }
  .movie-poster { height: 110px; }
}
</style>

function getPosterUrl(title) {
  const path = POSTERS[title];
  return path ? "https://image.tmdb.org/t/p/w300" + path : null;
}

const genres = ["ALL", "ACTION", "COMEDY", "DRAMA", "HORROR", "TEEN", "SCI-FI", "ROMANCE"];
let activeGenre = "ALL";
let searchQuery = "";

// --- Animate stat counters ---
function animateCount(el, target, duration, suffix) {
  const start = performance.now();
  const update = (now) => {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(target * eased) + (suffix || '');
    if (progress < 1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

// --- Now Playing ---
function randomizeNowPlaying() {
  const movie = movies[Math.floor(Math.random() * movies.length)];
  const poster = document.getElementById('now-poster');
  const title = document.getElementById('now-title');
  const year = document.getElementById('now-year');
  poster.style.background = movie.gradient;
  poster.style.position = 'relative';
  poster.style.overflow = 'hidden';
  const posterUrl = getPosterUrl(movie.title);
  poster.innerHTML = posterUrl ? `<img src="${posterUrl}" alt="${movie.title}" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;" onerror="this.remove()">` : '';
  title.textContent = movie.title.toUpperCase();
  year.textContent = movie.year + ' | ' + movie.genre;
}

// --- Activity Log ---
function buildActivityLog() {
  const log = document.getElementById('activity-log');
  const genreCounts = {};
  movies.forEach(m => { genreCounts[m.genre] = (genreCounts[m.genre] || 0) + 1; });

  const lines = [];
  lines.push({ type: 'ok', text: '[BOOT] Mainframe initialized' });
  lines.push({ type: 'ok', text: '[AUTH] Terminal access granted' });
  for (const g of Object.keys(genreCounts)) {
    lines.push({ type: 'ok', text: `[OK] Loaded ${g}: ${genreCounts[g]} films` });
  }
  lines.push({ type: 'ok', text: `[OK] Total records: ${movies.length}` });
  lines.push({ type: 'warn', text: '[SYNC] Database synced @ 23:59' });
  lines.push({ type: 'ok', text: '[RDY] Awaiting user input...' });

  let i = 0;
  function addLine() {
    if (i >= lines.length) return;
    const div = document.createElement('div');
    div.className = 'log-line';
    const cls = lines[i].type === 'warn' ? 'warn' : 'ok';
    div.innerHTML = `<span class="${cls}">${lines[i].text}</span>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
    i++;
    setTimeout(addLine, 300 + Math.random() * 200);
  }
  addLine();
}

// --- Genre Tabs ---
function buildGenreTabs() {
  const container = document.getElementById('genre-tabs');
  genres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'genre-tab' + (g === activeGenre ? ' active' : '');
    btn.textContent = `[${g}]`;
    btn.addEventListener('click', () => {
      activeGenre = g;
      document.querySelectorAll('.genre-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    });
    container.appendChild(btn);
  });
}

// --- Movie Grid ---
function renderGrid() {
  const grid = document.getElementById('movie-grid');
  grid.innerHTML = '';

  let filtered = movies;
  if (activeGenre !== 'ALL') {
    filtered = filtered.filter(m => m.genre === activeGenre);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(m => m.title.toLowerCase().includes(q));
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">&gt; NO RECORDS FOUND_</div>';
    return;
  }

  filtered.forEach(m => {
    const card = document.createElement('div');
    card.className = 'movie-card';
    const idStr = String(m.id).padStart(3, '0');
    const posterUrl = getPosterUrl(m.title);
    card.innerHTML = `
      <div class="movie-poster" style="background: ${m.gradient};">
        ${posterUrl ? `<img src="${posterUrl}" alt="${m.title}" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;" onerror="this.remove()">` : ''}
        <span class="poster-label">${m.genre}</span>
      </div>
      <div class="movie-meta">
        <span class="movie-name">${m.title.toUpperCase()}</span>
        <span class="movie-id">ID: ${idStr}</span> | ${m.year}
      </div>
    `;
    grid.appendChild(card);
  });
}

// --- Search ---
document.getElementById('search-input').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderGrid();
});

// --- R key randomize ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    if (document.activeElement === document.getElementById('search-input')) return;
    randomizeNowPlaying();
  }
});

// --- Ticker ---
function buildTicker() {
  const el = document.getElementById('ticker-inner');
  const text = '>> NOW TRACKING 296 FILMS >> QUIZ MODE AVAILABLE >> BUILD YOUR TIER LIST >> RANDOM PICK READY >> ';
  el.textContent = text + text;
}

// --- Init ---
function init() {
  animateCount(document.getElementById('stat-films'), 296, 1800);
  animateCount(document.getElementById('stat-genres'), 7, 1200);
  animateCount(document.getElementById('stat-uptime'), 12847, 2200);
  animateCount(document.getElementById('stat-mem'), 64, 1000);

  randomizeNowPlaying();
  buildActivityLog();
  buildGenreTabs();
  renderGrid();
  buildTicker();
}

init();
</script>
