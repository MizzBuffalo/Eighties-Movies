<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy's 80s Movie Vault — Underground Cinema Club</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Code+Pro:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink: #e8527a;
  --yellow: #f5e642;
  --white: #ededed;
  --concrete: #2a2a2a;
  --bg: #1c1c1c;
  --action: #d4380d;
  --comedy: #faad14;
  --drama: #1890ff;
  --horror: #722ed1;
  --teen: #e8527a;
  --scifi: #13c2c2;
  --romance: #eb2f96;
}

/* Film grain overlay */
@keyframes grain {
  0%, 100% { transform: translate(0, 0); }
  10% { transform: translate(-5%, -10%); }
  20% { transform: translate(-15%, 5%); }
  30% { transform: translate(7%, -25%); }
  40% { transform: translate(-5%, 25%); }
  50% { transform: translate(-15%, 10%); }
  60% { transform: translate(15%, 0%); }
  70% { transform: translate(0%, 15%); }
  80% { transform: translate(3%, 35%); }
  90% { transform: translate(-10%, 10%); }
}

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Source Code Pro', monospace;
  overflow-x: hidden;
  position: relative;
}

/* Noise/grain texture overlay on entire page */
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  animation: grain 0.8s steps(8) infinite;
}

/* Spray paint splatters */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
  background:
    radial-gradient(ellipse 120px 100px at 10% 30%, rgba(232,82,122,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 80px 130px at 85% 15%, rgba(245,230,66,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 150px 80px at 50% 60%, rgba(232,82,122,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 60px 90px at 20% 80%, rgba(245,230,66,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 100px 60px at 75% 75%, rgba(232,82,122,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 90px 110px at 95% 50%, rgba(245,230,66,0.04) 0%, transparent 70%);
}

/* Sticky header */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: #141414;
  border-bottom: 2px solid var(--pink);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.sticky-header .logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: var(--pink);
  letter-spacing: 3px;
  white-space: nowrap;
}

.search-wrap {
  flex: 1;
  max-width: 360px;
  min-width: 180px;
}

.search-wrap input {
  width: 100%;
  background: var(--concrete);
  border: 2px solid #444;
  color: var(--white);
  font-family: 'Source Code Pro', monospace;
  font-size: 0.85rem;
  padding: 8px 14px;
  outline: none;
  transition: border-color 0.2s;
}

.search-wrap input::placeholder { color: #777; }
.search-wrap input:focus { border-color: var(--pink); }

/* Genre filter buttons */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 8px 24px 4px;
  background: #141414;
  position: sticky;
  top: 52px;
  z-index: 999;
}

.filter-btn {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 5px 12px;
  border: 2px solid #555;
  background: transparent;
  color: #aaa;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover { border-color: var(--pink); color: var(--white); }
.filter-btn.active { background: var(--pink); border-color: var(--pink); color: #fff; }

/* Banner / header area */
.banner {
  position: relative;
  height: 200px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  z-index: 2;
}

/* Spray-paint pink splash behind title */
.banner::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 500px;
  height: 160px;
  background:
    radial-gradient(ellipse 260px 90px at 50% 50%, rgba(232,82,122,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 120px 60px at 30% 40%, rgba(232,82,122,0.2) 0%, transparent 70%),
    radial-gradient(ellipse 100px 50px at 70% 60%, rgba(232,82,122,0.25) 0%, transparent 70%);
  z-index: 0;
}

/* Extra spray splatters on banner */
.banner::after {
  content: '';
  position: absolute;
  top: 10px;
  right: 40px;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, rgba(245,230,66,0.15) 0%, transparent 60%);
  z-index: 0;
}

.banner-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 4.5rem;
  letter-spacing: 10px;
  color: var(--white);
  z-index: 1;
  text-align: center;
  line-height: 1;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
}

.banner-tagline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 6px;
  color: var(--yellow);
  z-index: 1;
  margin-top: 8px;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
}

.banner-sub {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.7rem;
  color: #888;
  z-index: 1;
  margin-top: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* Genre sections */
.genre-section {
  padding: 28px 24px 12px;
  position: relative;
  z-index: 2;
}

.genre-section.hidden { display: none; }

.genre-header {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  text-transform: uppercase;
  letter-spacing: 8px;
  color: var(--white);
  margin-bottom: 14px;
  position: relative;
  display: inline-block;
}

.genre-header::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 100%;
  height: 3px;
  background: var(--pink);
}

/* Horizontal scroll row */
.scroll-row {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  cursor: grab;
  padding-bottom: 16px;
  scrollbar-width: thin;
  scrollbar-color: #444 transparent;
  -webkit-overflow-scrolling: touch;
  user-select: none;
}

.scroll-row:active { cursor: grabbing; }

.scroll-row::-webkit-scrollbar { height: 6px; }
.scroll-row::-webkit-scrollbar-track { background: transparent; }
.scroll-row::-webkit-scrollbar-thumb { background: #444; }

/* Movie card */
.movie-card {
  flex: 0 0 150px;
  position: relative;
  transition: transform 0.2s;
}

.movie-card.hidden { display: none; }

.movie-card:hover { transform: translateY(-4px); }

.card-poster {
  width: 150px;
  height: 225px; /* 3:4.5 */
  position: relative;
  background: var(--concrete);
  box-shadow: 4px 4px 0 rgba(0,0,0,0.6);
  overflow: hidden;
}

.card-poster .poster-bg {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 12px;
  text-align: center;
}

.poster-bg .poster-year {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  color: rgba(255,255,255,0.3);
  line-height: 1;
}

.poster-bg .poster-icon {
  font-size: 1.6rem;
  margin-top: 6px;
  opacity: 0.3;
}

.card-poster .poster-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* "SEEN IT?" sticker badge on hover */
.card-poster::after {
  content: 'SEEN IT?';
  position: absolute;
  top: 10px;
  right: -8px;
  background: var(--pink);
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 2px;
  padding: 3px 10px;
  transform: rotate(8deg) scale(0);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 5;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
}

.movie-card:hover .card-poster::after {
  transform: rotate(8deg) scale(1);
}

/* Genre color left border */
.card-poster { border-left: 3px solid var(--pink); }
.movie-card[data-genre="action"] .card-poster { border-left-color: var(--action); }
.movie-card[data-genre="comedy"] .card-poster { border-left-color: var(--comedy); }
.movie-card[data-genre="drama"] .card-poster { border-left-color: var(--drama); }
.movie-card[data-genre="horror"] .card-poster { border-left-color: var(--horror); }
.movie-card[data-genre="teen"] .card-poster { border-left-color: var(--teen); }
.movie-card[data-genre="sci-fi"] .card-poster { border-left-color: var(--scifi); }
.movie-card[data-genre="romance"] .card-poster { border-left-color: var(--romance); }

.card-info {
  padding: 8px 2px;
}

.card-title {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--white);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-year {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.65rem;
  color: #777;
  margin-top: 2px;
}

/* Footer */
.grungy-footer {
  margin-top: 40px;
  padding: 20px 24px;
  background: #141414;
  border-top: 3px solid var(--pink);
  text-align: center;
  position: relative;
  z-index: 2;
}

.footer-links {
  font-family: 'Source Code Pro', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--white);
}

.footer-links span {
  color: #555;
  margin: 0 8px;
}

.footer-links .ft-item {
  cursor: pointer;
  transition: color 0.2s;
}
.footer-links .ft-item:hover { color: var(--pink); }

.footer-sub {
  font-size: 0.65rem;
  color: #555;
  margin-top: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* No results message */
.no-results {
  display: none;
  text-align: center;
  padding: 60px 24px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 4px;
  color: #555;
  z-index: 2;
  position: relative;
}

.no-results.visible { display: block; }

/* Mobile responsive */
@media (max-width: 768px) {
  .sticky-header {
    padding: 8px 14px;
    gap: 8px;
  }
  .sticky-header .logo { font-size: 1rem; letter-spacing: 2px; }
  .search-wrap { min-width: 140px; }
  .filter-bar {
    padding: 6px 14px 4px;
    top: 46px;
    gap: 4px;
  }
  .filter-btn { font-size: 0.6rem; padding: 4px 8px; }
  .banner { height: 160px; }
  .banner-title { font-size: 2.5rem; letter-spacing: 5px; }
  .banner-tagline { font-size: 1rem; letter-spacing: 3px; }
  .genre-section { padding: 20px 14px 8px; }
  .genre-header { font-size: 1.2rem; letter-spacing: 5px; }
  .scroll-row { gap: 10px; }
  .movie-card { flex: 0 0 120px; }
  .card-poster { width: 120px; height: 180px; }
  .card-title { font-size: 0.65rem; }
  .card-year { font-size: 0.58rem; }
  .poster-bg .poster-year { font-size: 1.8rem; }
  .footer-links { font-size: 0.6rem; letter-spacing: 1.5px; }
  .footer-links span { margin: 0 4px; }
}

@media (max-width: 480px) {
  .banner-title { font-size: 2rem; letter-spacing: 3px; }
  .banner-tagline { font-size: 0.85rem; letter-spacing: 2px; }
  .banner-sub { font-size: 0.6rem; }
  .sticky-header { flex-direction: column; align-items: stretch; }
  .sticky-header .logo { text-align: center; }
  .search-wrap { max-width: 100%; }
  .filter-bar { top: 80px; }
}
</style>
</head>

function getPosterUrl(title) {
  const path = POSTERS[title];
  return path ? "https://image.tmdb.org/t/p/w300" + path : null;
}

// Build sections
const container = document.getElementById('movieSections');

Object.entries(movieData).forEach(([genre, data]) => {
  const section = document.createElement('section');
  section.className = 'genre-section';
  section.dataset.genre = genre;

  let cardsHTML = '';
  data.movies.forEach(([title, year]) => {
    const posterUrl = getPosterUrl(title);
    cardsHTML += `
      <div class="movie-card" data-genre="${genre}" data-title="${title.toLowerCase()}">
        <div class="card-poster">
          ${posterUrl ? `<img class="poster-img" src="${posterUrl}" alt="${title}" onerror="this.remove()">` : ''}
          <div class="poster-bg" style="background: ${data.gradient}">
            <div class="poster-year">${year}</div>
            <div class="poster-icon">${data.icon}</div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">${title}</div>
          <div class="card-year">${year}</div>
        </div>
      </div>`;
  });

  section.innerHTML = `
    <div class="genre-header">${data.label}</div>
    <div class="scroll-row">${cardsHTML}</div>`;

  container.appendChild(section);
});

// Search filtering
const searchInput = document.getElementById('searchInput');
const noResults = document.getElementById('noResults');

searchInput.addEventListener('input', () => {
  const query = searchInput.value.toLowerCase().trim();
  let anyVisible = false;

  document.querySelectorAll('.genre-section').forEach(section => {
    const cards = section.querySelectorAll('.movie-card');
    let sectionVisible = false;

    cards.forEach(card => {
      const title = card.dataset.title;
      const match = !query || title.includes(query);
      card.classList.toggle('hidden', !match);
      if (match) sectionVisible = true;
    });

    // Also check genre filter
    const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
    const genreMatch = activeFilter === 'all' || section.dataset.genre === activeFilter;

    section.classList.toggle('hidden', !sectionVisible || !genreMatch);
    if (sectionVisible && genreMatch) anyVisible = true;
  });

  noResults.classList.toggle('visible', !anyVisible);
});

// Genre filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;

    // Re-trigger combined filtering
    const query = searchInput.value.toLowerCase().trim();
    let anyVisible = false;

    document.querySelectorAll('.genre-section').forEach(section => {
      const genreMatch = filter === 'all' || section.dataset.genre === filter;
      const cards = section.querySelectorAll('.movie-card');
      let sectionHasVisible = false;

      cards.forEach(card => {
        const titleMatch = !query || card.dataset.title.includes(query);
        card.classList.toggle('hidden', !titleMatch);
        if (titleMatch) sectionHasVisible = true;
      });

      section.classList.toggle('hidden', !genreMatch || !sectionHasVisible);
      if (genreMatch && sectionHasVisible) anyVisible = true;
    });

    noResults.classList.toggle('visible', !anyVisible);
  });
});

// Drag-to-scroll on horizontal rows
document.querySelectorAll('.scroll-row').forEach(row => {
  let isDown = false;
  let startX;
  let scrollLeft;

  row.addEventListener('mousedown', e => {
    isDown = true;
    startX = e.pageX - row.offsetLeft;
    scrollLeft = row.scrollLeft;
  });

  row.addEventListener('mouseleave', () => { isDown = false; });
  row.addEventListener('mouseup', () => { isDown = false; });

  row.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - row.offsetLeft;
    const walk = (x - startX) * 1.5;
    row.scrollLeft = scrollLeft - walk;
  });

  // Touch support
  let touchStartX;
  let touchScrollLeft;

  row.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].pageX - row.offsetLeft;
    touchScrollLeft = row.scrollLeft;
  }, { passive: true });

  row.addEventListener('touchmove', e => {
    const x = e.touches[0].pageX - row.offsetLeft;
    const walk = (x - touchStartX) * 1.5;
    row.scrollLeft = touchScrollLeft - walk;
  }, { passive: true });
});
</script>
