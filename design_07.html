<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy's 80s Movie Vault — Synthwave Horizon</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --pink: #e8527a;
  --cyan: #00e5ff;
  --silver: #c0c0c0;
  --deep-purple: #1a0030;
  --bg: #0d0015;
  --pink-glow: 0 0 15px #e8527a, 0 0 30px #e8527a66;
  --cyan-glow: 0 0 15px #00e5ff, 0 0 30px #00e5ff66;
}

html {
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: #e0d0f0;
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ========== STICKY HEADER ========== */
.site-header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: linear-gradient(180deg, #0d0015 60%, #0d001500);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 1px solid #e8527a33;
  transition: background 0.3s;
}

.header-logo {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 1.1rem;
  letter-spacing: 2px;
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
  flex-shrink: 0;
}

.search-wrapper {
  position: relative;
  max-width: 380px;
  width: 100%;
}

.search-bar {
  width: 100%;
  padding: 10px 16px 10px 40px;
  background: #1a003088;
  border: 1px solid #e8527a44;
  border-radius: 8px;
  color: #e0d0f0;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.search-bar::placeholder {
  color: #8866aa;
}

.search-bar:focus {
  border-color: var(--pink);
  box-shadow: 0 0 12px #e8527a44;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: #e8527a88;
  font-size: 1rem;
  pointer-events: none;
}

/* ========== HERO / COVER SECTION ========== */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  min-height: 600px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Starfield */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(1px 1px at 10% 20%, #ffffff88, transparent),
    radial-gradient(1px 1px at 30% 10%, #ffffff55, transparent),
    radial-gradient(1.5px 1.5px at 50% 30%, #ffffff77, transparent),
    radial-gradient(1px 1px at 70% 15%, #ffffff44, transparent),
    radial-gradient(1px 1px at 90% 25%, #ffffff66, transparent),
    radial-gradient(1.5px 1.5px at 15% 40%, #ffffff55, transparent),
    radial-gradient(1px 1px at 85% 45%, #ffffff33, transparent),
    radial-gradient(1px 1px at 25% 55%, #ffffff44, transparent),
    radial-gradient(1.5px 1.5px at 60% 5%, #ffffff66, transparent),
    radial-gradient(1px 1px at 45% 48%, #ffffff55, transparent),
    radial-gradient(1px 1px at 5% 8%, #ffffff44, transparent),
    radial-gradient(1px 1px at 75% 38%, #ffffff33, transparent);
  z-index: 0;
}

/* Sunset gradient band */
.sunset {
  position: absolute;
  bottom: 30%;
  left: 0;
  right: 0;
  height: 220px;
  background: linear-gradient(180deg,
    transparent 0%,
    #1a003000 10%,
    #4a0060aa 25%,
    #e8527acc 45%,
    #ff6b3588 55%,
    #e8527a99 65%,
    #4a0060aa 80%,
    #1a003066 95%,
    transparent 100%
  );
  z-index: 1;
}

/* Sun orb */
.sun {
  position: absolute;
  bottom: calc(30% + 30px);
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: linear-gradient(180deg, #ff6b35 0%, #e8527a 40%, #aa2266 80%, #660044 100%);
  box-shadow: 0 0 60px #e8527a88, 0 0 120px #e8527a44;
  z-index: 1;
  /* Horizontal scan lines on the sun */
  -webkit-mask-image: repeating-linear-gradient(
    180deg,
    #000 0px, #000 4px,
    transparent 4px, transparent 7px
  );
  mask-image: repeating-linear-gradient(
    180deg,
    #000 0px, #000 4px,
    transparent 4px, transparent 7px
  );
}

/* Perspective grid floor */
.grid-floor {
  position: absolute;
  bottom: 0;
  left: -50%;
  width: 200%;
  height: 45%;
  background:
    repeating-linear-gradient(
      90deg,
      #e8527a33 0px,
      #e8527a33 1px,
      transparent 1px,
      transparent 80px
    ),
    repeating-linear-gradient(
      0deg,
      #e8527a33 0px,
      #e8527a33 1px,
      transparent 1px,
      transparent 80px
    );
  transform: perspective(400px) rotateX(60deg);
  transform-origin: center top;
  z-index: 2;
  animation: gridScroll 4s linear infinite;
}

@keyframes gridScroll {
  0% { background-position: 0 0, 0 0; }
  100% { background-position: 0 80px, 0 80px; }
}

/* Grid overlay glow */
.grid-floor::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 0%, #0d001500 30%, #0d0015cc 70%, #0d0015 100%);
}

/* Hero content */
.hero-content {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 0 24px;
}

.hero-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(2rem, 6vw, 4.5rem);
  letter-spacing: 6px;
  line-height: 1.1;
  margin-bottom: 16px;
  background: linear-gradient(180deg, #ffffff 0%, #c0c0c0 30%, #a0a0a0 50%, #c0c0c0 70%, #ffffff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px #e8527a88) drop-shadow(0 2px 4px #00000088);
  text-transform: uppercase;
}

.hero-subtitle {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 300;
  font-size: clamp(1rem, 2.5vw, 1.5rem);
  letter-spacing: 4px;
  color: var(--cyan);
  text-shadow: 0 0 20px #00e5ff66;
  margin-bottom: 40px;
}

.enter-btn {
  display: inline-block;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: clamp(0.9rem, 2vw, 1.2rem);
  letter-spacing: 4px;
  padding: 16px 48px;
  background: transparent;
  color: var(--pink);
  border: 2px solid var(--pink);
  border-radius: 4px;
  cursor: pointer;
  text-decoration: none;
  text-transform: uppercase;
  transition: all 0.3s;
  animation: btnPulse 2s ease-in-out infinite;
}

@keyframes btnPulse {
  0%, 100% { box-shadow: 0 0 10px #e8527a66, 0 0 20px #e8527a33, inset 0 0 10px #e8527a22; }
  50% { box-shadow: 0 0 20px #e8527aaa, 0 0 40px #e8527a55, inset 0 0 20px #e8527a44; }
}

.enter-btn:hover {
  background: var(--pink);
  color: #0d0015;
  box-shadow: 0 0 30px #e8527acc, 0 0 60px #e8527a66;
  animation: none;
}

/* Scroll hint */
.scroll-hint {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  color: #e8527a88;
  font-family: 'Rajdhani', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  animation: scrollBounce 2s ease-in-out infinite;
}

.scroll-hint::after {
  content: '';
  display: block;
  width: 20px;
  height: 20px;
  margin: 8px auto 0;
  border-right: 2px solid #e8527a88;
  border-bottom: 2px solid #e8527a88;
  transform: rotate(45deg);
}

@keyframes scrollBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(10px); }
}

/* ========== GENRE FILTER ========== */
.filters-bar {
  padding: 20px 24px 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}

.filter-btn {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 20px;
  background: transparent;
  color: var(--silver);
  border: 1px solid #c0c0c044;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.3s;
}

.filter-btn:hover {
  border-color: var(--cyan);
  color: var(--cyan);
  box-shadow: var(--cyan-glow);
}

.filter-btn.active {
  border-color: var(--pink);
  color: var(--pink);
  box-shadow: var(--pink-glow);
  background: #e8527a15;
}

/* ========== MOVIE ROWS ========== */
.movies-section {
  padding: 20px 0 120px;
}

.genre-row {
  margin-bottom: 36px;
}

.genre-row.hidden {
  display: none;
}

.genre-label {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 0 28px 12px;
  color: var(--cyan);
  text-shadow: 0 0 10px #00e5ff44;
}

.row-scroll {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding: 8px 28px 16px;
  cursor: grab;
  scrollbar-width: thin;
  scrollbar-color: #e8527a44 transparent;
  -webkit-overflow-scrolling: touch;
}

.row-scroll:active {
  cursor: grabbing;
}

.row-scroll::-webkit-scrollbar {
  height: 6px;
}

.row-scroll::-webkit-scrollbar-track {
  background: transparent;
}

.row-scroll::-webkit-scrollbar-thumb {
  background: #e8527a44;
  border-radius: 3px;
}

/* ========== MOVIE CARD ========== */
.movie-card {
  flex: 0 0 150px;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: transform 0.3s, filter 0.3s;
}

.movie-card.card-hidden {
  display: none;
}

.movie-card:hover {
  transform: translateY(-6px) scale(1.03);
}

.card-poster {
  width: 150px;
  height: 225px;
  border-radius: 6px;
  position: relative;
  overflow: hidden;
  border: 1px solid #e8527a33;
  transition: border-color 0.3s, box-shadow 0.3s;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.movie-card:hover .card-poster {
  border-color: var(--pink);
  box-shadow: 0 0 12px #e8527a88, 0 0 24px #e8527a33;
}

.card-poster .poster-year {
  position: absolute;
  top: 8px;
  right: 8px;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  color: #ffffffcc;
  background: #00000066;
  padding: 2px 6px;
  border-radius: 3px;
  letter-spacing: 1px;
}

.card-poster .poster-icon {
  font-size: 2.8rem;
  margin-bottom: 24px;
  opacity: 0.5;
  filter: grayscale(0.2);
}

.card-poster .poster-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
}

.card-title {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 0.82rem;
  color: #e0d0f0;
  margin-top: 8px;
  line-height: 1.2;
  text-align: center;
  max-width: 150px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

/* ========== SEARCH RESULTS STATE ========== */
.no-results {
  text-align: center;
  padding: 60px 24px;
  display: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.2rem;
  color: #8866aa;
}

.no-results.visible {
  display: block;
}

/* ========== BOTTOM STICKY BAR ========== */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 999;
  background: linear-gradient(180deg, #0d001500, #0d0015ee 30%, #0d0015 100%);
  padding: 20px 0 14px;
}

.bottom-bar-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  font-family: 'Orbitron', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
}

.bar-item {
  padding: 0 20px;
  color: var(--cyan);
  text-shadow: 0 0 10px #00e5ff66;
  cursor: pointer;
  transition: color 0.3s, text-shadow 0.3s;
}

.bar-item:hover {
  color: var(--pink);
  text-shadow: 0 0 15px #e8527a88;
}

.bar-divider {
  width: 2px;
  height: 18px;
  background: var(--pink);
  box-shadow: 0 0 8px #e8527a88;
  border-radius: 1px;
}

/* ========== MOBILE ========== */
@media (max-width: 640px) {
  .site-header {
    padding: 10px 14px;
    gap: 10px;
  }

  .header-logo {
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  .search-bar {
    font-size: 0.9rem;
    padding: 8px 12px 8px 34px;
  }

  .hero-title {
    letter-spacing: 3px;
  }

  .hero-subtitle {
    letter-spacing: 2px;
  }

  .enter-btn {
    padding: 12px 32px;
    letter-spacing: 3px;
  }

  .sun {
    width: 130px;
    height: 130px;
  }

  .filter-btn {
    font-size: 0.6rem;
    padding: 6px 14px;
  }

  .genre-label {
    font-size: 0.85rem;
    padding: 0 16px 10px;
  }

  .row-scroll {
    gap: 12px;
    padding: 8px 16px 14px;
  }

  .movie-card {
    flex: 0 0 120px;
  }

  .card-poster {
    width: 120px;
    height: 180px;
  }

  .card-title {
    font-size: 0.75rem;
    max-width: 120px;
  }

  .card-poster .poster-icon {
    font-size: 2.2rem;
  }

  .bottom-bar-inner {
    font-size: 0.6rem;
    letter-spacing: 2px;
  }

  .bar-item {
    padding: 0 12px;
  }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .grid-floor { animation: none; }
  .enter-btn { animation: none; }
  .scroll-hint { animation: none; }
}
</style>
</head>
<body>

<!-- STICKY HEADER -->
<header class="site-header">
  <div class="header-logo">AMY'S VAULT</div>
  <div class="search-wrapper">
    <span class="search-icon">&#128269;</span>
    <input type="text" class="search-bar" id="searchBar" placeholder="Search 80s movies..." autocomplete="off">
  </div>
</header>

<!-- HERO SECTION -->
<section class="hero" id="hero">
  <div class="sun"></div>
  <div class="sunset"></div>
  <div class="grid-floor"></div>
  <div class="hero-content">
    <h1 class="hero-title">Amy's 80s<br>Movie Vault</h1>
    <p class="hero-subtitle">296 Films. Your Friends. Game On.</p>
    <a href="#movies" class="enter-btn">Enter the Vault</a>
  </div>
  <div class="scroll-hint">Scroll</div>
</section>

<!-- GENRE FILTERS -->
<div class="filters-bar" id="filtersBar">
  <button class="filter-btn active" data-genre="all">All</button>
  <button class="filter-btn" data-genre="action">Action</button>
  <button class="filter-btn" data-genre="comedy">Comedy</button>
  <button class="filter-btn" data-genre="drama">Drama</button>
  <button class="filter-btn" data-genre="horror">Horror</button>
  <button class="filter-btn" data-genre="teen">Teen</button>
  <button class="filter-btn" data-genre="sci-fi">Sci-Fi</button>
  <button class="filter-btn" data-genre="romance">Romance</button>
</div>

<!-- MOVIE ROWS -->
<section class="movies-section" id="movies"></section>
<div class="no-results" id="noResults">No movies found. Try a different search.</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <div class="bottom-bar-inner">
    <span class="bar-item">Quiz</span>
    <span class="bar-divider"></span>
    <span class="bar-item">Rank</span>
    <span class="bar-divider"></span>
    <span class="bar-item">Track</span>
    <span class="bar-divider"></span>
    <span class="bar-item">Random</span>
  </div>
</div>

<script>
// ========== MOVIE DATA ==========
const genres = [
  {
    name: 'Action', key: 'action',
    gradient: 'linear-gradient(135deg, #d4380d, #ff7a45)',
    icon: '💥',
    movies: [
      ['Raiders of the Lost Ark', 1981], ['Die Hard', 1988], ['The Terminator', 1984],
      ['RoboCop', 1987], ['Beverly Hills Cop', 1984], ['Top Gun', 1986],
      ['Lethal Weapon', 1987], ['Aliens', 1986], ['First Blood', 1982], ['Predator', 1987]
    ]
  },
  {
    name: 'Comedy', key: 'comedy',
    gradient: 'linear-gradient(135deg, #faad14, #ffc53d)',
    icon: '😂',
    movies: [
      ['Ghostbusters', 1984], ['Ferris Bueller\'s Day Off', 1986], ['Tootsie', 1982],
      ['Coming to America', 1988], ['Airplane!', 1980], ['Beetlejuice', 1988],
      ['Trading Places', 1983], ['National Lampoon\'s Vacation', 1983], ['Spaceballs', 1987], ['9 to 5', 1980]
    ]
  },
  {
    name: 'Drama', key: 'drama',
    gradient: 'linear-gradient(135deg, #1890ff, #69c0ff)',
    icon: '🎭',
    movies: [
      ['Stand By Me', 1986], ['Scarface', 1983], ['Rain Man', 1988],
      ['The Color Purple', 1985], ['Platoon', 1986], ['Full Metal Jacket', 1987],
      ['Ordinary People', 1980], ['Driving Miss Daisy', 1989], ['Blue Velvet', 1986], ['Do the Right Thing', 1989]
    ]
  },
  {
    name: 'Horror', key: 'horror',
    gradient: 'linear-gradient(135deg, #722ed1, #b37feb)',
    icon: '👻',
    movies: [
      ['The Shining', 1980], ['A Nightmare on Elm Street', 1984], ['The Thing', 1982],
      ['Poltergeist', 1982], ['Gremlins', 1984], ['The Fly', 1986],
      ['Friday the 13th', 1980], ['Halloween II', 1981], ['Christine', 1983], ['Hellraiser', 1987]
    ]
  },
  {
    name: 'Teen', key: 'teen',
    gradient: 'linear-gradient(135deg, #e8527a, #ff85a2)',
    icon: '🎒',
    movies: [
      ['The Breakfast Club', 1985], ['Sixteen Candles', 1984], ['Pretty in Pink', 1986],
      ['Fast Times at Ridgemont High', 1982], ['Heathers', 1988], ['Say Anything', 1989],
      ['Valley Girl', 1983], ['Some Kind of Wonderful', 1987], ['Weird Science', 1985]
    ]
  },
  {
    name: 'Sci-Fi', key: 'sci-fi',
    gradient: 'linear-gradient(135deg, #13c2c2, #5cdbd3)',
    icon: '🚀',
    movies: [
      ['Back to the Future', 1985], ['E.T.', 1982], ['Blade Runner', 1982],
      ['Tron', 1982], ['WarGames', 1983], ['The Last Starfighter', 1984],
      ['Cocoon', 1985], ['Short Circuit', 1986], ['They Live', 1988]
    ]
  },
  {
    name: 'Romance', key: 'romance',
    gradient: 'linear-gradient(135deg, #eb2f96, #ff85c0)',
    icon: '💕',
    movies: [
      ['Dirty Dancing', 1987], ['Flashdance', 1983], ['An Officer and a Gentleman', 1982],
      ['When Harry Met Sally', 1989], ['Moonstruck', 1987], ['The Princess Bride', 1987]
    ]
  }
];

// ========== BUILD DOM ==========
const moviesSection = document.getElementById('movies');

genres.forEach(genre => {
  const row = document.createElement('div');
  row.className = 'genre-row';
  row.dataset.genre = genre.key;

  const label = document.createElement('div');
  label.className = 'genre-label';
  label.textContent = genre.name;
  row.appendChild(label);

  const scroll = document.createElement('div');
  scroll.className = 'row-scroll';

  genre.movies.forEach(([title, year]) => {
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.dataset.title = title.toLowerCase();
    card.dataset.genre = genre.key;

    card.innerHTML = `
      <div class="card-poster" style="background:${genre.gradient}">
        <span class="poster-year">${year}</span>
        <span class="poster-icon">${genre.icon}</span>
      </div>
      <div class="card-title">${title}</div>
    `;
    scroll.appendChild(card);
  });

  row.appendChild(scroll);
  moviesSection.appendChild(row);
});

// ========== DRAG TO SCROLL ==========
document.querySelectorAll('.row-scroll').forEach(el => {
  let isDown = false, startX, scrollLeft;

  el.addEventListener('mousedown', e => {
    isDown = true;
    el.style.cursor = 'grabbing';
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });

  el.addEventListener('mouseleave', () => { isDown = false; el.style.cursor = 'grab'; });
  el.addEventListener('mouseup', () => { isDown = false; el.style.cursor = 'grab'; });

  el.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollLeft - (x - startX) * 1.5;
  });

  // Touch
  let touchStartX, touchScrollLeft;
  el.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].pageX;
    touchScrollLeft = el.scrollLeft;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    const x = e.touches[0].pageX;
    el.scrollLeft = touchScrollLeft - (x - touchStartX);
  }, { passive: true });
});

// ========== SEARCH ==========
const searchBar = document.getElementById('searchBar');
const noResults = document.getElementById('noResults');

searchBar.addEventListener('input', () => {
  const query = searchBar.value.toLowerCase().trim();
  let anyVisible = false;

  document.querySelectorAll('.genre-row').forEach(row => {
    let rowHasVisible = false;
    row.querySelectorAll('.movie-card').forEach(card => {
      const match = !query || card.dataset.title.includes(query);
      card.classList.toggle('card-hidden', !match);
      if (match) rowHasVisible = true;
    });

    // Also check genre filter
    const activeGenre = document.querySelector('.filter-btn.active')?.dataset.genre || 'all';
    const genreMatch = activeGenre === 'all' || row.dataset.genre === activeGenre;

    row.classList.toggle('hidden', !rowHasVisible || !genreMatch);
    if (rowHasVisible && genreMatch) anyVisible = true;
  });

  noResults.classList.toggle('visible', !anyVisible);
});

// ========== GENRE FILTER ==========
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const genre = btn.dataset.genre;

    document.querySelectorAll('.genre-row').forEach(row => {
      const genreMatch = genre === 'all' || row.dataset.genre === genre;

      // Also check search
      let rowHasVisible = false;
      const query = searchBar.value.toLowerCase().trim();
      row.querySelectorAll('.movie-card').forEach(card => {
        const searchMatch = !query || card.dataset.title.includes(query);
        if (searchMatch) rowHasVisible = true;
      });

      row.classList.toggle('hidden', !genreMatch || !rowHasVisible);
    });

    // Update no results
    const anyVisible = document.querySelector('.genre-row:not(.hidden)');
    noResults.classList.toggle('visible', !anyVisible);
  });
});
</script>
</body>
</html>
