<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy's 80s Movie Vault — Midnight Poster Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #181818;
  --bg-alt: #1c1c1c;
  --card-bg: #222222;
  --pink: #e8527a;
  --blue: #4a9eff;
  --white: #f5f5f5;
  --white-dim: #aaaaaa;
}

body {
  font-family: 'Work Sans', sans-serif;
  background-color: var(--bg);
  background-image: repeating-linear-gradient(
    45deg,
    var(--bg) 0px,
    var(--bg) 10px,
    var(--bg-alt) 10px,
    var(--bg-alt) 20px
  );
  color: var(--white);
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── Sticky Header ── */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(24, 24, 24, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(232, 82, 122, 0.25);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.header-logo {
  font-family: 'Anton', sans-serif;
  font-size: 1.15rem;
  color: var(--pink);
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}

.search-box {
  flex: 1;
  max-width: 380px;
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 8px 14px 8px 36px;
  border-radius: 6px;
  border: 1px solid #333;
  background: #1a1a1a;
  color: var(--white);
  font-family: 'Work Sans', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s;
}

.search-box input::placeholder { color: #666; }
.search-box input:focus { border-color: var(--pink); }

.search-box::before {
  content: "\1F50D";
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.85rem;
  opacity: 0.5;
}

.movie-count {
  font-size: 0.8rem;
  color: var(--white-dim);
  white-space: nowrap;
}

.movie-count span {
  color: var(--pink);
  font-weight: 700;
}

/* ── Banner ── */
.banner {
  position: relative;
  height: 230px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  overflow: hidden;
  background: linear-gradient(180deg, #1a1a1a 0%, var(--bg) 100%);
}

.banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 30px,
    rgba(232, 82, 122, 0.04) 30px,
    rgba(232, 82, 122, 0.04) 32px
  );
  pointer-events: none;
}

.banner::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--pink), var(--blue), var(--pink), transparent);
}

.banner h1 {
  font-family: 'Anton', sans-serif;
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  color: var(--pink);
  text-transform: uppercase;
  letter-spacing: 3px;
  line-height: 1;
  text-shadow: 0 0 40px rgba(232, 82, 122, 0.35);
  position: relative;
  z-index: 1;
}

.banner p {
  font-family: 'Work Sans', sans-serif;
  font-size: clamp(0.95rem, 2vw, 1.25rem);
  color: var(--white);
  margin-top: 10px;
  font-weight: 400;
  letter-spacing: 2px;
  position: relative;
  z-index: 1;
}

.banner p span {
  color: var(--blue);
  font-weight: 700;
}

/* ── Genre Filters ── */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 18px 20px 12px;
  justify-content: center;
  max-width: 900px;
  margin: 0 auto;
}

.filter-pill {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid #444;
  background: transparent;
  color: var(--white-dim);
  font-family: 'Work Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.filter-pill:hover {
  border-color: var(--pink);
  color: var(--pink);
}

.filter-pill.active {
  background: var(--pink);
  border-color: var(--pink);
  color: #fff;
}

/* ── Poster Grid ── */
.poster-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  padding: 14px 14px 30px;
  max-width: 1600px;
  margin: 0 auto;
}

/* ── Card ── */
.poster-card {
  position: relative;
  aspect-ratio: 3 / 4.5;
  border-radius: 6px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  transform-style: preserve-3d;
}

.poster-card.hidden { display: none; }

.poster-card:hover {
  transform: perspective(600px) rotateY(5deg) rotateX(-3deg) scale(1.04);
  box-shadow: 0 12px 30px rgba(0,0,0,0.6), 0 0 15px rgba(232, 82, 122, 0.2);
  z-index: 5;
}

.poster-bg {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 8px;
  text-align: center;
}

.poster-icon {
  font-size: 2.2rem;
  margin-bottom: 6px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
}

.poster-card .poster-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
}

.poster-title {
  font-family: 'Anton', sans-serif;
  font-size: 0.88rem;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.15;
  text-shadow: 0 2px 8px rgba(0,0,0,0.6);
}

.poster-year-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(0,0,0,0.65);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  font-family: 'Work Sans', sans-serif;
}

.genre-pill-tag {
  position: absolute;
  top: 6px;
  left: 6px;
  font-size: 0.55rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  font-family: 'Work Sans', sans-serif;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
}

/* Hover overlay */
.poster-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(232,82,122,0.0) 30%, rgba(232,82,122,0.85) 100%);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 10px 8px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.poster-card:hover .poster-overlay { opacity: 1; }

.overlay-title {
  font-family: 'Anton', sans-serif;
  font-size: 0.82rem;
  color: #fff;
  text-transform: uppercase;
  line-height: 1.15;
  transform: translateY(10px);
  transition: transform 0.3s ease;
}

.poster-card:hover .overlay-title { transform: translateY(0); }

.overlay-meta {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.85);
  margin-top: 2px;
  transform: translateY(10px);
  transition: transform 0.35s ease;
}

.poster-card:hover .overlay-meta { transform: translateY(0); }

/* ── Bottom Action Bar ── */
.action-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(24, 24, 24, 0.85);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid rgba(232, 82, 122, 0.2);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 10px 8px;
  max-height: 64px;
}

.action-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  color: var(--pink);
  text-decoration: none;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
  flex: 1;
}

.action-item:hover {
  opacity: 0.8;
  transform: translateY(-2px);
}

.action-icon {
  font-size: 1.25rem;
  line-height: 1;
}

.action-label {
  font-family: 'Work Sans', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

/* ── No Results ── */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
  color: var(--white-dim);
  font-size: 1.1rem;
  display: none;
}

.no-results.show { display: block; }

.no-results span { color: var(--pink); font-weight: 700; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sticky-header {
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 12px;
  }
  .header-logo { font-size: 0.95rem; }
  .search-box { max-width: none; order: 3; flex-basis: 100%; }
  .movie-count { font-size: 0.72rem; }
  .banner { height: 180px; }
  .poster-grid {
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 6px;
    padding: 10px 8px 24px;
  }
  .filters { padding: 12px 10px 8px; gap: 6px; }
  .filter-pill { padding: 5px 12px; font-size: 0.72rem; }
  .action-label { font-size: 0.58rem; }
}

@media (max-width: 480px) {
  .poster-grid {
    grid-template-columns: repeat(auto-fill, minmax(95px, 1fr));
    gap: 5px;
    padding: 8px 6px 20px;
  }
  .banner h1 { font-size: 2.2rem; }
  .poster-title { font-size: 0.72rem; }
  .poster-icon { font-size: 1.6rem; }
}

@media (min-width: 1200px) {
  .poster-grid {
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  }
}
</style>
</head>
<body>

<!-- Sticky Header -->
<header class="sticky-header">
  <div class="header-logo">Amy's 80s Vault</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search 80s movies..." autocomplete="off">
  </div>
  <div class="movie-count"><span id="visibleCount">74</span> / 74 films</div>
</header>

<!-- Banner -->
<section class="banner">
  <h1>Amy's 80s Movie Vault</h1>
  <p><span>74</span> Films of Pure 80s Glory</p>
</section>

<!-- Genre Filters -->
<nav class="filters" id="genreFilters">
  <button class="filter-pill active" data-genre="all">All</button>
  <button class="filter-pill" data-genre="Action">Action</button>
  <button class="filter-pill" data-genre="Comedy">Comedy</button>
  <button class="filter-pill" data-genre="Drama">Drama</button>
  <button class="filter-pill" data-genre="Horror">Horror</button>
  <button class="filter-pill" data-genre="Teen">Teen</button>
  <button class="filter-pill" data-genre="Sci-Fi">Sci-Fi</button>
  <button class="filter-pill" data-genre="Romance">Romance</button>
</nav>

<!-- Poster Grid -->
<main class="poster-grid" id="posterGrid"></main>

<!-- Bottom Action Bar -->
<div class="action-bar">
  <div class="action-item">
    <span class="action-icon">&#127922;</span>
    <span class="action-label">Spin the Wheel</span>
  </div>
  <div class="action-item">
    <span class="action-icon">&#11088;</span>
    <span class="action-label">Rate &amp; Track</span>
  </div>
  <div class="action-item">
    <span class="action-icon">&#10067;</span>
    <span class="action-label">Quiz Time</span>
  </div>
  <div class="action-item">
    <span class="action-icon">&#127942;</span>
    <span class="action-label">Tier List</span>
  </div>
</div>

<script>
const movies = [
  // Action
  { title: "Raiders of the Lost Ark", year: 1981, genre: "Action", icon: "\u{1F3F9}" },
  { title: "Die Hard", year: 1988, genre: "Action", icon: "\u{1F4A5}" },
  { title: "The Terminator", year: 1984, genre: "Action", icon: "\u{1F916}" },
  { title: "RoboCop", year: 1987, genre: "Action", icon: "\u{1F52B}" },
  { title: "Beverly Hills Cop", year: 1984, genre: "Action", icon: "\u{1F693}" },
  { title: "Top Gun", year: 1986, genre: "Action", icon: "\u{2708}\u{FE0F}" },
  { title: "Lethal Weapon", year: 1987, genre: "Action", icon: "\u{1F4A3}" },
  { title: "Aliens", year: 1986, genre: "Action", icon: "\u{1F47E}" },
  { title: "First Blood", year: 1982, genre: "Action", icon: "\u{1F52A}" },
  { title: "Predator", year: 1987, genre: "Action", icon: "\u{1F3AF}" },
  // Comedy
  { title: "Ghostbusters", year: 1984, genre: "Comedy", icon: "\u{1F47B}" },
  { title: "Ferris Bueller's Day Off", year: 1986, genre: "Comedy", icon: "\u{1F60E}" },
  { title: "Tootsie", year: 1982, genre: "Comedy", icon: "\u{1F484}" },
  { title: "Coming to America", year: 1988, genre: "Comedy", icon: "\u{1F451}" },
  { title: "Airplane!", year: 1980, genre: "Comedy", icon: "\u{2708}\u{FE0F}" },
  { title: "Beetlejuice", year: 1988, genre: "Comedy", icon: "\u{1F9DF}" },
  { title: "Trading Places", year: 1983, genre: "Comedy", icon: "\u{1F4B0}" },
  { title: "National Lampoon's Vacation", year: 1983, genre: "Comedy", icon: "\u{1F697}" },
  { title: "Spaceballs", year: 1987, genre: "Comedy", icon: "\u{1F680}" },
  { title: "9 to 5", year: 1980, genre: "Comedy", icon: "\u{1F4BC}" },
  // Drama
  { title: "Stand By Me", year: 1986, genre: "Drama", icon: "\u{1F6E4}\u{FE0F}" },
  { title: "Scarface", year: 1983, genre: "Drama", icon: "\u{1F4B5}" },
  { title: "Rain Man", year: 1988, genre: "Drama", icon: "\u{1F3B0}" },
  { title: "The Color Purple", year: 1985, genre: "Drama", icon: "\u{1F49C}" },
  { title: "Platoon", year: 1986, genre: "Drama", icon: "\u{1FA96}" },
  { title: "Full Metal Jacket", year: 1987, genre: "Drama", icon: "\u{1FA96}" },
  { title: "Ordinary People", year: 1980, genre: "Drama", icon: "\u{1F3E0}" },
  { title: "Driving Miss Daisy", year: 1989, genre: "Drama", icon: "\u{1F698}" },
  { title: "Blue Velvet", year: 1986, genre: "Drama", icon: "\u{1F535}" },
  { title: "Do the Right Thing", year: 1989, genre: "Drama", icon: "\u{270A}" },
  // Horror
  { title: "The Shining", year: 1980, genre: "Horror", icon: "\u{1FA93}" },
  { title: "A Nightmare on Elm Street", year: 1984, genre: "Horror", icon: "\u{1F608}" },
  { title: "The Thing", year: 1982, genre: "Horror", icon: "\u{2744}\u{FE0F}" },
  { title: "Poltergeist", year: 1982, genre: "Horror", icon: "\u{1F4FA}" },
  { title: "Gremlins", year: 1984, genre: "Horror", icon: "\u{1F47F}" },
  { title: "The Fly", year: 1986, genre: "Horror", icon: "\u{1FAB0}" },
  { title: "Friday the 13th", year: 1980, genre: "Horror", icon: "\u{1F3AD}" },
  { title: "Halloween II", year: 1981, genre: "Horror", icon: "\u{1F383}" },
  { title: "Christine", year: 1983, genre: "Horror", icon: "\u{1F697}" },
  { title: "Hellraiser", year: 1987, genre: "Horror", icon: "\u{1F4E6}" },
  // Teen
  { title: "The Breakfast Club", year: 1985, genre: "Teen", icon: "\u{270A}" },
  { title: "Sixteen Candles", year: 1984, genre: "Teen", icon: "\u{1F382}" },
  { title: "Pretty in Pink", year: 1986, genre: "Teen", icon: "\u{1F338}" },
  { title: "Fast Times at Ridgemont High", year: 1982, genre: "Teen", icon: "\u{1F3C4}" },
  { title: "Heathers", year: 1988, genre: "Teen", icon: "\u{1F480}" },
  { title: "Say Anything", year: 1989, genre: "Teen", icon: "\u{1F4FB}" },
  { title: "Valley Girl", year: 1983, genre: "Teen", icon: "\u{1F485}" },
  { title: "Some Kind of Wonderful", year: 1987, genre: "Teen", icon: "\u{1F48E}" },
  { title: "Weird Science", year: 1985, genre: "Teen", icon: "\u{1F9EA}" },
  // Sci-Fi
  { title: "Back to the Future", year: 1985, genre: "Sci-Fi", icon: "\u{231A}" },
  { title: "E.T.", year: 1982, genre: "Sci-Fi", icon: "\u{1F47D}" },
  { title: "Blade Runner", year: 1982, genre: "Sci-Fi", icon: "\u{1F307}" },
  { title: "Tron", year: 1982, genre: "Sci-Fi", icon: "\u{1F4BE}" },
  { title: "WarGames", year: 1983, genre: "Sci-Fi", icon: "\u{1F4BB}" },
  { title: "The Last Starfighter", year: 1984, genre: "Sci-Fi", icon: "\u{1F579}\u{FE0F}" },
  { title: "Cocoon", year: 1985, genre: "Sci-Fi", icon: "\u{1FA90}" },
  { title: "Short Circuit", year: 1986, genre: "Sci-Fi", icon: "\u{26A1}" },
  { title: "They Live", year: 1988, genre: "Sci-Fi", icon: "\u{1F576}\u{FE0F}" },
  // Romance
  { title: "Dirty Dancing", year: 1987, genre: "Romance", icon: "\u{1F483}" },
  { title: "Flashdance", year: 1983, genre: "Romance", icon: "\u{1F4A6}" },
  { title: "An Officer and a Gentleman", year: 1982, genre: "Romance", icon: "\u{1F396}\u{FE0F}" },
  { title: "When Harry Met Sally", year: 1989, genre: "Romance", icon: "\u{2615}" },
  { title: "Moonstruck", year: 1987, genre: "Romance", icon: "\u{1F319}" },
  { title: "The Princess Bride", year: 1987, genre: "Romance", icon: "\u{1F451}" },
];

const genreGradients = {
  "Action":  "linear-gradient(135deg, #d4380d, #ff7a45)",
  "Comedy":  "linear-gradient(135deg, #faad14, #ffc53d)",
  "Drama":   "linear-gradient(135deg, #1890ff, #69c0ff)",
  "Horror":  "linear-gradient(135deg, #722ed1, #b37feb)",
  "Teen":    "linear-gradient(135deg, #e8527a, #ff85a2)",
  "Sci-Fi":  "linear-gradient(135deg, #13c2c2, #5cdbd3)",
  "Romance": "linear-gradient(135deg, #eb2f96, #ff85c0)"
};

const genrePillColors = {
  "Action":  "#d4380d",
  "Comedy":  "#d48806",
  "Drama":   "#1890ff",
  "Horror":  "#722ed1",
  "Teen":    "#e8527a",
  "Sci-Fi":  "#13c2c2",
  "Romance": "#eb2f96"
};

// Shuffle for that mixed-poster-wall feel
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const shuffled = shuffle(movies);
const grid = document.getElementById('posterGrid');
const noResults = document.createElement('div');
noResults.className = 'no-results';
noResults.innerHTML = 'No movies match your search. <span>Try something else!</span>';
grid.appendChild(noResults);

shuffled.forEach(movie => {
  const card = document.createElement('div');
  card.className = 'poster-card';
  card.dataset.genre = movie.genre;
  card.dataset.title = movie.title.toLowerCase();

  card.innerHTML = `
    <div class="poster-bg" style="background: ${genreGradients[movie.genre]};">
      <div class="poster-icon">${movie.icon}</div>
      <div class="poster-title">${movie.title}</div>
    </div>
    <span class="poster-year-badge">${movie.year}</span>
    <span class="genre-pill-tag" style="background: ${genrePillColors[movie.genre]}cc;">${movie.genre}</span>
    <div class="poster-overlay">
      <div class="overlay-title">${movie.title}</div>
      <div class="overlay-meta">${movie.year} &middot; ${movie.genre}</div>
    </div>
  `;
  grid.appendChild(card);
});

// State
let activeGenre = 'all';
let searchTerm = '';

function filterMovies() {
  const cards = grid.querySelectorAll('.poster-card');
  let visible = 0;
  cards.forEach(card => {
    const matchGenre = activeGenre === 'all' || card.dataset.genre === activeGenre;
    const matchSearch = searchTerm === '' || card.dataset.title.includes(searchTerm);
    if (matchGenre && matchSearch) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });
  document.getElementById('visibleCount').textContent = visible;
  noResults.classList.toggle('show', visible === 0);
}

// Genre filter
document.getElementById('genreFilters').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-pill')) return;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  activeGenre = e.target.dataset.genre;
  filterMovies();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  filterMovies();
});
</script>
</body>
</html>
